                await fetch('/api/conversations/' + convId + '/clear', { method: 'POST' });
                if (convId === currentConversationId) await loadMessages(convId);
            } catch (error) { console.error('Clearing failed:', error); }
        }
        function showContextMenu(event, conv) {
            const oldMenu = document.querySelector('.context-menu');
            if (oldMenu) oldMenu.remove();
            const menu = document.createElement('div');
            menu.className = 'context-menu';
            menu.style.left = event.pageX + 'px';
            menu.style.top = event.pageY + 'px';
            if (conv.pinned && conv.title === 'Huolto') {
                menu.innerHTML = `<div class="context-menu-item" data-action="clear">${t('context_menu.clear')}</div><div class="context-menu-item" style="color: var(--text-muted);">${t('context_menu.locked')}</div>`;
            } else if (conv.pinned) {
                menu.innerHTML = `<div class="context-menu-item" style="color: var(--text-muted);">${t('context_menu.locked')}</div>`;
            } else {
                menu.innerHTML = `<div class="context-menu-item" data-action="rename">${t('context_menu.rename')}</div><div class="context-menu-item danger" data-action="delete">${t('buttons.delete')}</div>`;
            }
            document.body.appendChild(menu);
            menu.addEventListener('click', async (e) => {
                const action = e.target.dataset.action;
                if (action === 'rename') {
                    const newTitle = prompt(t('buttons.rename') + ':', conv.title);
                    if (newTitle && newTitle.trim()) {
                        await fetch('/api/conversations/' + conv.id, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title: newTitle.trim() }) });
                        await loadConversations();
                        if (conv.id === currentConversationId) chatTitle.textContent = newTitle.trim();
                    }
                } else if (action === 'delete') {
                    await fetch('/api/conversations/' + conv.id, { method: 'DELETE' });
                    if (conv.id === currentConversationId) {
                        currentConversationId = null;
                        chatTitle.textContent = t('sidebar.select_conversation');
                        messagesArea.innerHTML = '';
                        sendBtn.disabled = true;
                        messageInput.disabled = true;
                    }
                    await loadConversations();
                } else if (action === 'clear') {
                    await clearHuoltoConversation(conv.id);
                }
                menu.remove();
            });
            setTimeout(() => {
                document.addEventListener('click', function handler() { menu.remove(); document.removeEventListener('click', handler); });
            }, 10);
        }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function scrollToBottom() { messagesArea.scrollTop = messagesArea.scrollHeight; }
        messageInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 140) + 'px'; });
        
        // Event Listeners
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        newChatBtn.addEventListener('click', createNewConversation);
        vstBtn.addEventListener('click', showVSTModal);
        studioBtn.addEventListener('click', showStudioSetupModal);
        settingsBtn.addEventListener('click', showSettingsModal);
        reaperStatus.addEventListener('click', showSettingsModal);
        document.getElementById('hipareAboutBtn').addEventListener('click', showHipareAboutModal);

        // ============================================
        // HIPARE ABOUT MODAL
        // ============================================
        function showHipareAboutModal() {
            // Close sidebar
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('visible');

            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `
                <div class="modal" style="max-width: 520px;">
                    <div style="text-align: center; margin-bottom: 20px;">
                        <img src="Hipare_logo.png" alt="Hipare" style="width: 80px; height: 80px; border-radius: 16px; margin-bottom: 8px;">
                        <div style="font-family: 'Rubik Mono One', monospace; font-size: 1.6rem; color: var(--neon-bright); text-shadow: 0 0 30px rgba(162, 117, 72, 0.4);">
                            HIPARE
                        </div>
                    </div>
                    <div style="color: var(--text-secondary); font-size: 0.9rem; line-height: 1.8; margin-bottom: 20px;">
                        ${t('onboarding.step4_text_1')}
                        <br><br>
                        ${t('onboarding.step4_text_2')}
                        <br><br>
                        ${t('onboarding.step4_text_3')}
                    </div>
                    <a href="https://buymeacoffee.com/hipare" class="onboarding-coffee" target="_blank" style="display: block; text-align: center; padding: 14px; background: rgba(162, 117, 72, 0.1); border: 1px solid var(--border-subtle); border-radius: 12px; color: var(--neon-bright); text-decoration: none; font-size: 0.9rem; margin-bottom: 16px;">
                        ${t('onboarding.coffee_text')}
                    </a>
                    <div style="padding-top: 16px; border-top: 1px solid var(--border-subtle); font-size: 0.75rem; color: var(--text-muted); line-height: 1.6;">
                        ${t('about.feedback')} <a href="mailto:hipare@proton.me" style="color: var(--neon-primary); text-decoration: none;">hipare@proton.me</a><br>
                        ${t('about.bg_credit')} <a href="https://unsplash.com/@arnaudgirault" target="_blank" style="color: var(--neon-primary); text-decoration: none;">Arnaud Girault</a> on <a href="https://unsplash.com" target="_blank" style="color: var(--neon-primary); text-decoration: none;">Unsplash</a>
                    </div>
                    <button class="close-modal-btn" id="closeHipareAbout" style="margin-top: 16px;">${t('buttons.close')}</button>
                    <button class="save-modal-btn" id="resetOnboardingBtn2"
                            style="background: transparent; border: 1px solid var(--border-subtle); color: var(--text-muted); font-size: 0.8rem; padding: 10px; margin-top: 8px;">
                        ${t('onboarding.show_again')}
                    </button>
                </div>`;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
            document.getElementById('closeHipareAbout').addEventListener('click', () => overlay.remove());
            document.getElementById('resetOnboardingBtn2').addEventListener('click', async () => {
                await fetch('/api/onboarding-reset', { method: 'POST' });
                overlay.remove();
                await showOnboarding();
                await updateModelDropdown();
            });
        }

        // ============================================
        // ONBOARDING FLOW
        // ============================================
        async function checkAndShowOnboarding() {
            try {
                const resp = await fetch('/api/onboarding-status');
                const data = await resp.json();
                if (!data.completed) {
                    await showOnboarding();
                }
            } catch (e) {
                console.error('Onboarding check failed:', e);
            }
        }

        function showOnboarding() {
            return new Promise((resolve) => {
                let currentStep = 0;
                const totalSteps = 4;
                let onboardingData = {
                    apiKeys: {},
                    studioSetup: '',
                    selectedModel: ''
                };

                const overlay = document.createElement('div');
                overlay.className = 'onboarding-overlay';

                function renderStep() {
                    const dots = Array.from({length: totalSteps}, (_, i) => {
                        const cls = i < currentStep ? 'done' : (i === currentStep ? 'active' : '');
                        return `<div class="onboarding-step-dot ${cls}"></div>`;
                    }).join('');

                    const stepsHtml = `<div class="onboarding-steps">${dots}</div>`;

                    if (currentStep === 0) {
                        const addedKeysHtml = Object.entries(onboardingData.apiKeys).map(([k, v]) =>
                            `<div class="ob-added-key" data-key="${k}" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);border-radius:8px;margin-bottom:8px;">
                                <span style="font-size:0.85rem;color:var(--text-primary);">${k.replace('_API_KEY','').replace('_KEY','')} <span style="color:var(--text-muted);">••••${v.slice(-4)}</span></span>
                                <button class="ob-remove-key" data-key="${k}" style="background:none;border:none;color:var(--error);cursor:pointer;font-size:1.1rem;">✕</button>
                            </div>`
                        ).join('');

                        overlay.innerHTML = `
                            <div class="onboarding-card">
                                ${stepsHtml}
                                <div class="onboarding-title">${t('onboarding.step1_title')}</div>
                                <p class="onboarding-subtitle">
                                    ${t('onboarding.step1_description')}
                                </p>
                                <div id="ob-added-keys">${addedKeysHtml}</div>
                                <div class="onboarding-field">
                                    <label>${t('onboarding.api_key_label')}</label>
                                    <input type="password" class="modal-input" id="ob-key-input" placeholder="${t('onboarding.api_key_placeholder')}" style="margin-bottom:8px;">
                                </div>
                                <div class="onboarding-field">
                                    <label>${t('onboarding.provider_label')}</label>
                                    <select class="modal-input" id="ob-provider-select" style="cursor:pointer;">
                                        <option value="GROQ_API_KEY">Groq — console.groq.com</option>
                                        <option value="GOOGLE_API_KEY">Google Gemini — aistudio.google.com</option>
                                        <option value="OPENROUTER_API_KEY">OpenRouter — openrouter.ai</option>
                                        <option value="OPENAI_API_KEY">OpenAI — platform.openai.com</option>
                                        <option value="ANTHROPIC_API_KEY">Anthropic — console.anthropic.com</option>
                                        <option value="MISTRAL_API_KEY">Mistral — console.mistral.ai</option>
                                        <option value="TOGETHER_API_KEY">Together AI — api.together.xyz</option>
                                        <option value="DEEPSEEK_API_KEY">DeepSeek — platform.deepseek.com</option>
                                        <option value="PERPLEXITY_API_KEY">Perplexity — perplexity.ai</option>
                                        <option value="COHERE_API_KEY">Cohere — dashboard.cohere.com</option>
                                    </select>
                                </div>
                                <button class="btn-next" id="ob-add-key" style="margin-bottom:16px;flex:none;width:100%;background:rgba(162,117,72,0.2);border:1px solid var(--border-active);color:var(--neon-bright);">
                                    ${t('onboarding.add_key')}
                                </button>
                                <div id="ob-key-msg" style="display:none;padding:8px 12px;border-radius:8px;font-size:0.85rem;margin-bottom:12px;"></div>
                                <div class="onboarding-buttons">
                                    <button class="btn-skip" id="ob-skip">${t('buttons.skip')}</button>
                                    <button class="btn-next" id="ob-next">${t('buttons.continue')}</button>
                                </div>
                            </div>`;

                        document.getElementById('ob-add-key').onclick = () => {
                            const input = document.getElementById('ob-key-input');
                            const select = document.getElementById('ob-provider-select');
                            const msg = document.getElementById('ob-key-msg');
                            const val = input.value.trim();
                            if (!val) {
                                msg.style.display = 'block';
                                msg.style.background = 'rgba(248,113,113,0.15)';
                                msg.style.color = 'var(--error)';
                                msg.textContent = t('onboarding.key_empty_error');
                                return;
                            }
                            onboardingData.apiKeys[select.value] = val;
                            input.value = '';
                            msg.style.display = 'block';
                            msg.style.background = 'rgba(74,222,128,0.15)';
                            msg.style.color = 'var(--success)';
                            msg.textContent = '✓ ' + select.value.replace('_API_KEY','').replace('_KEY','') + ' ' + t('onboarding.key_added');
                            renderStep(); // re-render to show added key
                        };

                        overlay.querySelectorAll('.ob-remove-key').forEach(btn => {
                            btn.onclick = () => {
                                delete onboardingData.apiKeys[btn.dataset.key];
                                renderStep();
                            };
                        });

                        document.getElementById('ob-skip').onclick = () => { currentStep++; renderStep(); };
                        document.getElementById('ob-next').onclick = async () => {
                            if (Object.keys(onboardingData.apiKeys).length > 0) {
                                await fetch('/api/api-keys', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify(onboardingData.apiKeys)
                                });
                            }
                            currentStep++;
                            renderStep();
                        };

                    } else if (currentStep === 1) {
                        overlay.innerHTML = `
                            <div class="onboarding-card">
                                ${stepsHtml}
                                <div class="onboarding-title">${t('onboarding.step2_title')}</div>
                                <p class="onboarding-subtitle">
                                    ${t('onboarding.step2_description')}
                                </p>
                                <textarea class="studio-input" id="ob-studio"
                                    placeholder="${t('onboarding.step2_placeholder')}"
                                    style="min-height: 120px;">${onboardingData.studioSetup}</textarea>
                                <div class="onboarding-buttons">
                                    <button class="btn-skip" id="ob-skip">${t('buttons.skip')}</button>
                                    <button class="btn-next" id="ob-next">${t('buttons.continue')}</button>
                                </div>
                            </div>`;

                        document.getElementById('ob-skip').onclick = () => { currentStep++; renderStep(); };
                        document.getElementById('ob-next').onclick = async () => {
                            const desc = document.getElementById('ob-studio').value.trim();
                            onboardingData.studioSetup = desc;
                            if (desc) {
                                await fetch('/api/studio-setup', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ description: desc })
                                });
                            }
                            currentStep++;
                            renderStep();
                        };

                    } else if (currentStep === 2) {
                        const hasGroq = !!onboardingData.apiKeys.GROQ_API_KEY;
                        const hasGoogle = !!onboardingData.apiKeys.GOOGLE_API_KEY;
                        const hasOpenRouter = !!onboardingData.apiKeys.OPENROUTER_API_KEY;
                        const hasAnyKeys = Object.keys(onboardingData.apiKeys).length > 0;

                        const models = [
                            { id: 'llama-3.3-70b', name: 'Llama 3.3 70B', provider: 'Groq', icon: '🦙', enabled: hasGroq },
                            { id: 'gemini-2.0-flash', name: 'Gemini 2.0 Flash', provider: 'Google', icon: '⚡', enabled: hasGoogle },
                            { id: 'gemini-2.5-pro', name: 'Gemini 2.5 Pro', provider: 'Google', icon: '👑', enabled: hasGoogle },
                            { id: 'deepseek-chat-v3', name: 'DeepSeek V3', provider: 'OpenRouter', icon: '🔮', enabled: hasOpenRouter },
                            { id: 'claude-3.5-haiku', name: 'Claude 3.5 Haiku', provider: 'OpenRouter', icon: '📝', enabled: hasOpenRouter },
                            { id: 'mistral-small', name: 'Mistral Small', provider: 'OpenRouter', icon: '🌬️', enabled: hasOpenRouter }
                        ];

                        const modelsHtml = models.map(m => `
                            <div class="onboarding-model-item ${m.enabled ? '' : 'disabled'} ${onboardingData.selectedModel === m.id ? 'selected' : ''}"
                                 data-model-id="${m.id}" data-enabled="${m.enabled}">
                                <div class="model-name">${m.icon} ${m.name}</div>
                                <div class="model-provider">${m.provider}</div>
                            </div>
                        `).join('');

                        overlay.innerHTML = `
                            <div class="onboarding-card">
                                ${stepsHtml}
                                <div class="onboarding-title">${t('onboarding.step3_title')}</div>
                                <p class="onboarding-subtitle">
                                    ${hasAnyKeys ? t('onboarding.step3_has_keys') : t('onboarding.step3_no_keys')}
                                </p>
                                <div class="onboarding-model-grid">${modelsHtml}</div>
                                <div class="onboarding-buttons">
                                    <button class="btn-next" id="ob-next" style="flex: 1;">${t('buttons.continue')}</button>
                                </div>
                            </div>`;

                        overlay.querySelectorAll('.onboarding-model-item').forEach(item => {
                            item.addEventListener('click', () => {
                                if (item.dataset.enabled === 'false') return;
                                overlay.querySelectorAll('.onboarding-model-item').forEach(i => i.classList.remove('selected'));
                                item.classList.add('selected');
                                onboardingData.selectedModel = item.dataset.modelId;
                            });
                        });

                        document.getElementById('ob-next').onclick = async () => {
                            if (onboardingData.selectedModel) {
                                await fetch('/api/selected-models', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ models: [onboardingData.selectedModel] })
                                });
                            }
                            currentStep++;
                            renderStep();
                        };

                    } else if (currentStep === 3) {
                        overlay.innerHTML = `
                            <div class="onboarding-card" style="text-align: center;">
                                ${stepsHtml}
                                <img src="Hipare_logo.png" alt="Hipare" style="width: 90px; height: 90px; border-radius: 18px; margin-bottom: 10px;">
                                <div style="font-family: 'Rubik Mono One', monospace; font-size: 1.8rem; color: var(--neon-bright); margin-bottom: 8px; text-shadow: 0 0 30px rgba(162, 117, 72, 0.4);">
                                    HIPARE
                                </div>
                                <div class="onboarding-about-text" style="text-align: left;">
                                    ${t('onboarding.step4_text_1')}
                                    <br><br>
                                    ${t('onboarding.step4_text_2')}
                                    <br><br>
                                    ${t('onboarding.step4_text_3')}
                                </div>
                                <a href="https://buymeacoffee.com/hipare" class="onboarding-coffee" target="_blank">
                                    ${t('onboarding.coffee_text')}
                                </a>
                                <div class="onboarding-buttons">
                                    <button class="btn-next" id="ob-finish" style="flex: 1; font-size: 1rem; padding: 16px;">
                                        ${t('onboarding.start_using')}
                                    </button>
                                </div>
                            </div>`;

                        document.getElementById('ob-finish').onclick = async () => {
                            await fetch('/api/onboarding-complete', { method: 'POST' });
                            overlay.style.opacity = '0';
                            overlay.style.transition = 'opacity 0.4s';
                            setTimeout(() => {
                                overlay.remove();
                                resolve();
                            }, 400);
                        };
                    }
                }

                document.body.appendChild(overlay);
                renderStep();
            });
        }

        // Init
        async function init() {
            // Load language setting first
            try {
                const langResp = await fetch('/api/language');
                const langData = await langResp.json();
                await loadLocale(langData.language || 'fi');
            } catch (e) {
                await loadLocale('fi');
            }
            applyLocaleToUI();
            await checkAndShowOnboarding();
            await loadConversations();
            await loadVSTPlugins();
            await loadReaperInfo();
            await updateModelDropdown();
            console.log(t('app.version_loaded'));
        }
        init();
    </script>
</body>
</html>
